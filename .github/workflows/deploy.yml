name: Deploy to Cloudflare Pages

# Every push to master -> build -> deploy to production.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build # astro build -> static site in dist/
      # ponytail: create-if-missing, || true so it's a no-op once the project exists
      - run: npx wrangler pages project create la-patrona-fondita --production-branch=master || true
      - run: npx wrangler pages deploy dist --project-name=la-patrona-fondita --branch=master
